<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .game-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .game-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 200px; text-decoration: none; color: #333; }
        .game-card:hover { transform: scale(1.05); transition: 0.2s; }
    </style>
</head>
<body>

    <h1>🎮 Game Hub</h1>
    <p>Welcome to my collection of browser games.</p>

    <div class="game-list">
        <a href="games/snake/" class="game-card">
            <h3>Snake</h3>
            <p>Classic snake — eat, grow, don't crash.</p>
        </a>
    </div>

</body>
</html>
